<!DOCTYPE html>
<html lang="{{ site.lang | default: "ja" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  </head>
  <body>
    <!-- ハンバーガーメニューボタン -->
    <button class="hamburger-menu" id="hamburger-menu" aria-label="メニュー">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- サイドバーナビゲーション -->
    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="sidebar-header">
        <h3>目次</h3>
        <button class="close-btn" id="close-sidebar" aria-label="閉じる">&times;</button>
      </div>
      <ul class="nav-list">
        <li><a href="#基本情報">基本情報</a></li>
        <li><a href="#私の強み">私の強み</a></li>
        <li><a href="#資格">資格</a></li>
        <li><a href="#保有スキル">保有スキル</a></li>
        <li><a href="#技術スタック">技術スタック</a>
          <ul>
            <li><a href="#言語">言語</a></li>
            <li><a href="#フレームワークライブラリ">フレームワーク・ライブラリ</a></li>
            <li><a href="#データベース">データベース</a></li>
            <li><a href="#aiツール">AIツール</a></li>
            <li><a href="#ツールその他">ツール・その他</a></li>
          </ul>
        </li>
        <li><a href="#職務経歴詳細">職務経歴詳細</a></li>
        <li><a href="#副業個人開発等">副業・個人開発等</a></li>
      </ul>
    </nav>

    <!-- オーバーレイ -->
    <div class="overlay" id="overlay"></div>

    <div class="main-content">
      <a id="skip-to-content" href="#content">Skip to the content.</a>

      <header class="page-header" role="banner">
        <h1 class="project-name">職務経歴書</h1>
        <h2 class="project-tagline">吉田一葵の職務経歴書</h2>
        {% if site.show_downloads %}
          <a href="{{ site.github.zip_url }}" class="btn">Download .zip</a>
          <a href="{{ site.github.tar_url }}" class="btn">Download .tar.gz</a>
        {% endif %}
      </header>

      <!-- セクションインジケーター -->
      <div class="section-indicator" id="section-indicator">
        <span id="section-indicator-text"></span>
      </div>

      <main id="content" class="main-content" role="main">
        {{ content }}

      </main>
    </div>

    <script>
      // ハンバーガーメニューの制御
      const hamburger = document.getElementById('hamburger-menu');
      const sidebar = document.getElementById('sidebar-nav');
      const overlay = document.getElementById('overlay');
      const closeBtn = document.getElementById('close-sidebar');

      function openSidebar() {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeSidebar() {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      hamburger.addEventListener('click', openSidebar);
      closeBtn.addEventListener('click', closeSidebar);
      overlay.addEventListener('click', closeSidebar);

      // サイドバーのリンククリック時に閉じる
      const navLinks = document.querySelectorAll('.sidebar-nav a');
      navLinks.forEach(link => {
        link.addEventListener('click', closeSidebar);
      });

      // ESCキーでサイドバーを閉じる
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sidebar.classList.contains('active')) {
          closeSidebar();
        }
      });

      // セクションインジケーター
      const indicator = document.getElementById('section-indicator');
      const indicatorText = document.getElementById('section-indicator-text');
      const sections = document.querySelectorAll('main h2, main h3');

      // 案件情報（期間・役割・人数）を改行表示に整える
      function formatProjectMetaLines() {
        const paragraphs = document.querySelectorAll('main p');
        paragraphs.forEach((p) => {
          const html = p.innerHTML;
          if (!html.includes('<strong>期間</strong>:')) return;

          p.innerHTML = html
            .replace(/\s*<strong>役割<\/strong>:/g, '<br><strong>役割</strong>:')
            .replace(/\s*<strong>人数<\/strong>:/g, '<br><strong>人数</strong>:');
        });
      }

      function updateIndicator() {
        let current = null;
        sections.forEach(section => {
          if (section.getBoundingClientRect().top <= 60) {
            current = section;
          }
        });
        if (current) {
          indicatorText.textContent = current.textContent;
          indicator.classList.add('visible');
        } else {
          indicator.classList.remove('visible');
        }
      }

      window.addEventListener('scroll', updateIndicator, { passive: true });
      formatProjectMetaLines();
      updateIndicator();
    </script>
  </body>
</html>
